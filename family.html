    <script src="theme.js"></script>
    <script>
        (function () {
            var cloudName = 'dtpw5htqs';
            var uploadPreset = 'Upload_img';
            var maxFiles = 5;
            var maxSize = 5 * 1024 * 1024;
            var selectedCookingFiles = [];
            var uploadInput = document.getElementById('cooking-upload-input');
            var uploadHint = document.getElementById('cooking-upload-hint');
            var sendBtn = document.getElementById('cooking-send-btn');
            var preview = document.getElementById('cooking-upload-preview');
            var status = document.getElementById('cooking-upload-status');

            function setStatus(message) {
                if (status) {
                    status.textContent = message || '';
                    if (message) {
                        status.classList.add('is-visible');
                    } else {
                        status.classList.remove('is-visible');
                    }
                }
            }

            function renderPreview() {
                if (!preview || !sendBtn || !uploadHint) return;
                
                if (!selectedCookingFiles.length) {
                    preview.hidden = true;
                    uploadHint.hidden = false;
                    sendBtn.hidden = true;
                    return;
                }

                preview.innerHTML = '';
                selectedCookingFiles.forEach(function (file) {
                    var img = document.createElement('img');
                    img.alt = file.name;
                    img.src = URL.createObjectURL(file);
                    img.onload = function () {
                        URL.revokeObjectURL(img.src);
                    };
                    preview.appendChild(img);
                });
                
                uploadHint.hidden = true;
                preview.hidden = false;
                sendBtn.hidden = false;
            }

            function uploadToCloudinary(file) {
                return new Promise(function (resolve, reject) {
                    var formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', uploadPreset);

                    fetch('https://api.cloudinary.com/v1_1/' + cloudName + '/image/upload', {
                        method: 'POST',
                        body: formData
                    })
                    .then(function (response) {
                        return response.json();
                    })
                    .then(function (data) {
                        if (data.secure_url) {
                            resolve(data.secure_url);
                        } else {
                            reject(new Error('Upload failed'));
                        }
                    })
                    .catch(reject);
                });
            }

            function handleFileSelect(files) {
                var fileArray = Array.prototype.slice.call(files || []);
                uploadInput.value = '';
                if (!fileArray.length) return;

                for (var i = 0; i < fileArray.length; i += 1) {
                    if (selectedCookingFiles.length >= maxFiles) {
                        setStatus('Hiếu chưa pro nên chưa nâng cấp nhận nhiều ảnh');
                        setTimeout(function () {
                            setStatus('');
                        }, 4500);
                        break;
                    }

                    var file = fileArray[i];
                    if (!/^image\/(jpeg|png|webp|gif)$/i.test(file.type)) {
                        setStatus('Chỉ nhận ảnh JPG, PNG, WEBP hoặc GIF');
                        continue;
                    }

                    if (file.size > maxSize) {
                        setStatus('Ảnh tối đa 5MB');
                        continue;
                    }

                    selectedCookingFiles.push(file);
                }

                renderPreview();
            }

            if (uploadHint) {
                uploadHint.addEventListener('click', function () {
                    uploadInput.click();
                });
            }

            if (uploadInput) {
                uploadInput.addEventListener('change', function () {
                    handleFileSelect(uploadInput.files);
                });
            }

            if (sendBtn) {
                sendBtn.addEventListener('click', function () {
                    if (!selectedCookingFiles.length) return;
                    sendBtn.disabled = true;

                    selectedCookingFiles.reduce(function (chain, file) {
                        return chain.then(function () {
                            return uploadToCloudinary(file);
                        });
                    }, Promise.resolve()).then(function () {
                        // Clear files FIRST
                        selectedCookingFiles = [];
                        // Clear preview HTML immediately
                        if (preview) {
                            preview.innerHTML = '';
                            preview.hidden = true;
                        }
                        // Reset hint and button
                        if (uploadHint) uploadHint.hidden = false;
                        if (sendBtn) sendBtn.hidden = true;
                        // Show success message at center
                        setStatus('Cảm ơn bro đã gửi ảnh');
                        // Auto-hide after 3 seconds
                        setTimeout(function () {
                            setStatus('');
                        }, 3000);
                    }).catch(function (error) {
                        setStatus('Lỗi gửi ảnh');
                        console.error('Upload error:', error);
                        setTimeout(function () {
                            setStatus('');
                        }, 3000);
                    }).finally(function () {
                        sendBtn.disabled = false;
                    });
                });
            }
        })();
    </script>
