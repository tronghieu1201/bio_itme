<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc cá nhân – Trọng Hiếu</title>
    <meta name="description" content="Góc cá nhân của Trọng Hiếu – Nấu ăn, tâm sự, bạn bè và những khoảnh khắc đời thường.">
    <link rel="canonical" href="https://tronghieu1201.github.io/bio_itme/life.html">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="life.css">
</head>

<body>
    <!-- Background blobs -->
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <main class="bio-card life-page">
        <!-- Page header -->
        <header class="life-header">
            <a href="./" class="life-back" id="life-back" aria-label="Quay lại trang bio">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
            <h1 class="life-title">𝖊𝖒 𝖍í𝖚</h1>
        </header>

        <!-- Category Cards -->
        <section class="life-grid" aria-label="Danh mục">
            <!-- Kỷ niệm -->
            <a href="./connections.html" class="life-card" id="card-connections">
                <div class="life-card__icon">
                    <i class="fas fa-images" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Kỷ niệm</h2>
                    <p class="life-card__desc">Những người quanh Hiếu</p>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </a>

            <!-- Lăng kính của Hiếu -->
            <a href="#" class="life-card" id="card-thoughts" data-category="thoughts">
                <div class="life-card__icon">
                    <i class="fas fa-feather-pointed" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Lăng kính của Hiếu</h2>
                    <p class="life-card__desc">Có thể bạn đã thấy ở đâu đó...</p>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </a>

            <!-- Nấu ăn -->
            <a href="./cooking.html" class="life-card" id="card-cooking">
                <div class="life-card__icon">
                    <i class="fas fa-bowl-food" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Nấu ăn</h2>
                    <p class="life-card__desc">Cơm sinh viên.</p>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </a>

            <!-- Khoảnh khắc -->
            <a href="#" class="life-card" id="card-daily" data-category="daily">
                <div class="life-card__icon">
                    <i class="fas fa-camera-retro" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Khoảnh khắc</h2>
                    <p class="life-card__desc">Một tí sự vô tri.</p>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </a>

            <!-- Feedback -->
            <button type="button" class="life-card life-card--button" id="card-join">
                <div class="life-card__icon">
                    <i class="fas fa-skull-crossbones" aria-hidden="true"></i>
                </div>
                <div class="life-card__body">
                    <h2 class="life-card__title">Feedback</h2>
                    <p class="life-card__desc">Gửi feedback tại đây...</p>
                </div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>
        </section>

        <!-- Gallery modal (populated by JS) -->
        <div class="gallery-overlay" id="gallery-overlay" aria-hidden="true">
            <div class="gallery-panel">
                <div class="gallery-panel__header">
                    <h2 class="gallery-panel__title" id="gallery-title"></h2>
                    <button class="gallery-panel__close" id="gallery-close" aria-label="Đóng">&times;</button>
                </div>
                <div class="gallery-panel__guide" id="thoughts-guide" hidden>
                    <button type="button" class="gallery-panel__guide-btn" id="thoughts-guide-btn">H&#432;&#7899;ng d&#7851;n</button>
                </div>
                <div class="gallery-panel__grid" id="gallery-grid">
                    <!-- Images injected by JS -->
                </div>
                <p class="gallery-panel__quote" id="gallery-quote" hidden></p>
                <p class="gallery-panel__empty" id="gallery-empty">Chưa update. Hãy quay lại sau nhé!🌷</p>
            </div>
        </div>
        <!-- Join modal -->
        <div class="join-modal" id="join-modal" role="dialog" aria-label="Feedback" aria-hidden="true">
            <div class="join-modal__backdrop"></div>
            <article class="join-modal__card">
                <button type="button" class="join-modal__close" id="join-close" aria-label="Đóng">&times;</button>
                <form class="join-form" id="join-form" action="https://script.google.com/macros/s/AKfycbzGVKOJ3meMpsssRLv-ZTdEa4Jtj3UyN1YupOwfdaezYV9LporQk_e2frmrAVWBihvLBA/exec"
                    method="POST">
                    <input type="hidden" name="createdAt" id="join-created-at">
                    <label class="join-form__field">
                        <input type="text" id="join-name" name="name" placeholder="Nhập suy nghĩ..." required>
                    </label>
                    <button type="submit" class="join-form__submit">Gửi</button>
                </form>
            </article>
        </div>
    </main>

    <div class="life-toast" id="life-toast" role="status" aria-live="polite">
        Thằng Hiếu chưa cập nhật, hãy quay lại sau nhé! 🌷
    </div>

    <script src="theme.js"></script>
    <script src="life.js"></script>
</body>

</html>
