<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọng Hiếu – Bio</title>
    <meta name="description"
        content="Trang bio cá nhân của Trọng Hiếu – Learning Technology, Cloud & AI Journey. Liên hệ qua Facebook, Instagram, LinkedIn, GitHub, Email và Zalo.">
    <link rel="canonical" href="https://tronghieu1201.github.io/bio_itme/">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="prefetch" href="./life.html">
    <link rel="prefetch" href="./connections.html">
    <link rel="prefetch" href="life.css">
    <link rel="prefetch" href="life.js">
</head>

<body>
    <!-- Background blobs -->
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <main class="bio-card home-bio-card">
        <!-- Profile header -->
        <header class="profile-header">
            <div class="avatar-ring">
                <img src="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284229/personal_photo_yobmmh.webp" alt="Ảnh đại diện Trọng Hiếu" width="140" height="140">
            </div>
            <button type="button" class="profile-name profile-name-btn" id="profile-info-open">
                Trọng Hiếu
            </button>
            <p class="profile-tagline">Learning Technology | Cloud &amp; AI Journey</p>
            <p class="profile-tagline">Bootcamp - First Cloud AI Journey at AWS Study Group</p>
            <p class="profile-subtagline">Kiến thức - Key skill - Sản phẩm</p>
        </header>

        <!-- Link groups -->
        <section class="link-hub" id="link-hub" aria-label="Nhóm liên kết">
            <button type="button" class="group-card" data-panel-target="work-panel">
                <span class="group-card__icon"><i class="fas fa-briefcase" aria-hidden="true"></i></span>
                <span class="group-card__body">
                    <span class="group-card__title">Công việc</span>
                </span>
                <i class="fas fa-chevron-right group-card__arrow" aria-hidden="true"></i>
            </button>

            <button type="button" class="group-card" data-panel-target="social-panel">
                <span class="group-card__icon"><i class="fas fa-user-friends" aria-hidden="true"></i></span>
                <span class="group-card__body">
                    <span class="group-card__title">Mạng xã hội</span>
                </span>
                <i class="fas fa-chevron-right group-card__arrow" aria-hidden="true"></i>
            </button>

            <a href="./life.html" class="group-card">
                <span class="group-card__icon"><i class="fas fa-heart" aria-hidden="true"></i></span>
                <span class="group-card__body">
                    <span class="group-card__title">Một nơi khác</span>
                </span>
                <i class="fas fa-chevron-right group-card__arrow" aria-hidden="true"></i>
            </a>
        </section>

        <section class="link-panel" id="work-panel" aria-label="Công việc" aria-hidden="true">
            <button type="button" class="panel-back" data-panel-back>
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </button>
            <div class="link-group__list">
                <a href="https://github.com/tronghieu1201" target="_blank" rel="noopener noreferrer"
                    class="link-btn link-btn--github" id="link-github">
                    <i class="fab fa-github" aria-hidden="true"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://www.linkedin.com/in/tronghieu-dev/" target="_blank" rel="noopener noreferrer"
                    class="link-btn link-btn--linkedin" id="link-linkedin">
                    <i class="fab fa-linkedin-in" aria-hidden="true"></i>
                    <span>LinkedIn</span>
                </a>
                <button type="button" class="link-btn link-btn--zalo" id="link-zalo"
                    data-qr-src="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284227/qr_zalo_huh7bk.webp" data-qr-alt="Mã QR Zalo phóng to">
                    <i class="fas fa-qrcode" aria-hidden="true"></i>
                    <span>Zalo QR</span>
                </button>
                <button type="button" class="link-btn link-btn--email" id="link-email"
                    data-email="tronghieu.dev16@gmail.com">
                    <i class="fas fa-at" aria-hidden="true"></i>
                    <span>Email</span>
                </button>
            </div>
        </section>

        <section class="link-panel" id="social-panel" aria-label="Mạng xã hội" aria-hidden="true">
            <button type="button" class="panel-back" data-panel-back>
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </button>
            <div class="link-group__list">
                <a href="https://www.facebook.com/trong.hieu.541439?locale=vi_VN" target="_blank"
                    rel="noopener noreferrer" class="link-btn link-btn--facebook" id="link-facebook">
                    <i class="fab fa-facebook-f" aria-hidden="true"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://www.instagram.com/em_hiusss/" target="_blank" rel="noopener noreferrer"
                    class="link-btn link-btn--instagram" id="link-instagram">
                    <i class="fab fa-instagram" aria-hidden="true"></i>
                    <span>Instagram</span>
                </a>
                <a href="https://locket.camera/links/Z5eRuLziCZaLzkZq8" target="_blank" rel="noopener noreferrer"
                    class="link-btn link-btn--locket" id="link-locket">
                    <i class="fas fa-heart" aria-hidden="true"></i>
                    <span>Locket</span>
                </a>
                <button type="button" class="link-btn link-btn--telegram" id="link-telegram"
                    data-qr-src="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284226/qr_lete_ucynnk.webp" data-qr-alt="Mã QR Telegram phóng to">
                    <i class="fab fa-telegram-plane" aria-hidden="true"></i>
                    <span>Telegram QR</span>
                </button>
            </div>
        </section>

        <section class="link-panel" id="life-panel" aria-label="Góc cá nhân" aria-hidden="true">
            <button type="button" class="panel-back" data-panel-back>
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </button>
            <div class="life-grid" id="life-grid-container">
                <!-- Life category cards will be inserted here by JS -->
            </div>
        </section>


        <!-- QR Lightbox -->
        <div class="lightbox" id="qr-lightbox" role="dialog" aria-label="QR phóng to" aria-hidden="true">
            <div class="lightbox__backdrop"></div>
            <div class="lightbox__content">
                <img src="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284227/qr_zalo_huh7bk.webp" alt="Mã QR Zalo phóng to" class="lightbox__img" id="qr-lightbox-img" loading="lazy" decoding="async">
            </div>
        </div>

        <!-- Profile info card -->
        <div class="profile-modal" id="profile-info-modal" role="dialog" aria-label="Thông tin cá nhân"
            aria-hidden="true">
            <div class="profile-modal__backdrop"></div>
            <article class="profile-modal__card">
                <button class="profile-modal__close" id="profile-info-close" aria-label="Đóng">&times;</button>
                <h2 class="profile-modal__title">Thông tin</h2>
                <div class="profile-modal__content">
                    <p class="profile-modal__empty">Cát Minh - Phù Cát - Bình Định</p>
                </div>
            </article>
        </div>
    </main>

    <!-- Toast notification -->
    <div class="toast" id="toast" aria-live="polite"></div>

    <script src="theme.js"></script>
    <script>
        // Handle Góc cá nhân panel
        (function() {
            var lifePanel = document.getElementById('life-panel');
            var lifeGridContainer = document.getElementById('life-grid-container');
            var groupCardButtons = document.querySelectorAll('[data-panel-target]');
            var panelBackButtons = document.querySelectorAll('[data-panel-back]');

            // Life categories config
            var lifeCategories = [
                {
                    id: 'connections',
                    title: 'Kỷ niệm',
                    icon: 'fas fa-images',
                    href: './connections.html',
                    desc: 'Những người quanh Hiếu'
                },
                {
                    id: 'thoughts',
                    title: 'Lăng kính của Hiếu',
                    icon: 'fas fa-feather-pointed',
                    href: './life.html?category=thoughts',
                    desc: 'Có thể bạn đã thấy ở đâu đó...'
                },
                {
                    id: 'cooking',
                    title: 'Nấu ăn',
                    icon: 'fas fa-utensils',
                    href: './cooking.html',
                    desc: 'Cơm sinh viên.'
                },
                {
                    id: 'daily',
                    title: 'Upload',
                    icon: 'fas fa-upload',
                    href: './life.html?category=daily',
                    desc: 'Ném ảnh tại đây.'
                },
                {
                    id: 'join',
                    title: 'Feedback',
                    icon: 'fas fa-skull-crossbones',
                    href: './life.html',
                    desc: 'Gửi feedback tại đây...'
                }
            ];

            // Render life categories
            function renderLifeCategories() {
                lifeGridContainer.innerHTML = '';
                lifeCategories.forEach(function(cat) {
                    var link = document.createElement('a');
                    link.href = cat.href || '#';
                    link.className = 'life-card';
                    link.id = 'life-card-' + cat.id;
                    link.innerHTML = '<div class="life-card__icon"><i class="' + cat.icon + '" aria-hidden="true"></i></div>' +
                                     '<div class="life-card__body">' +
                                     '<h2 class="life-card__title">' + cat.title + '</h2>' +
                                     '<p class="life-card__desc">' + cat.desc + '</p>' +
                                     '</div>' +
                                     '<i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>';
                    lifeGridContainer.appendChild(link);
                });
            }

            // Open panel
            function openPanel(targetId) {
                var targetPanel = document.getElementById(targetId);
                if (!targetPanel) return;

                // Hide all other panels
                var allPanels = document.querySelectorAll('.link-panel');
                allPanels.forEach(function(panel) {
                    panel.classList.remove('is-open');
                    panel.setAttribute('aria-hidden', 'true');
                });

                // Hide link hub
                var linkHub = document.getElementById('link-hub');
                if (linkHub) linkHub.classList.add('is-hidden');

                // Show target panel
                targetPanel.classList.add('is-open');
                targetPanel.setAttribute('aria-hidden', 'false');

                // Render life categories if life panel
                if (targetId === 'life-panel') {
                    renderLifeCategories();
                }
            }

            // Close panel
            function closePanel() {
                var allPanels = document.querySelectorAll('.link-panel');
                allPanels.forEach(function(panel) {
                    panel.classList.remove('is-open');
                    panel.setAttribute('aria-hidden', 'true');
                });

                var linkHub = document.getElementById('link-hub');
                if (linkHub) linkHub.classList.remove('is-hidden');
            }

            // Attach click handlers
            groupCardButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var targetId = btn.getAttribute('data-panel-target');
                    openPanel(targetId);
                    btn.classList.add('is-active');
                });
            });

            panelBackButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    closePanel();
                    groupCardButtons.forEach(function(btn) {
                        btn.classList.remove('is-active');
                    });
                });
            });
        })();
    </script>
</body>

</html>
