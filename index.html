<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Hieu Bio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background animation -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="bio-container">
        <!-- Profile Photo -->
        <div class="profile-section">
            <div class="profile-photo">
                <img src="images/personal_photo.jpg" alt="Ảnh cá nhân của Hiếu" class="img-fluid">
            </div>
        </div>

        <!-- Name & Description -->
        <h1 class="name mt-4">Trọng Hiếu</h1>
        <p class="description text-muted">Web Developer | Cloud Enthusiast</p>

        <!-- Social Links -->
        <div class="social-links mt-5">
            <!-- Facebook -->
            <a href="https://www.facebook.com/profile.php?id=61561660415335&locale=vi_VN" 
               target="_blank" 
               class="social-link btn btn-primary d-flex align-items-center justify-content-center shadow-lg bubble-effect">
                <i class="fab fa-facebook-f me-2"></i> Facebook
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/gt_hius/" 
               target="_blank" 
               class="social-link btn btn-danger d-flex align-items-center justify-content-center shadow-lg bubble-effect">
                <i class="fab fa-instagram me-2"></i> Instagram
            </a>

            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/tronghieu-dev/" 
               target="_blank" 
               class="social-link btn btn-info d-flex align-items-center justify-content-center shadow-lg bubble-effect">
                <i class="fab fa-linkedin-in me-2"></i> LinkedIn
            </a>
        </div>

        <!-- Zalo QR Code -->
        <div class="zalo-section mt-5">
            <p class="text-muted fw-bold">📱 Scan Zalo QR:</p>
            <div class="qr-container">
                <img src="images/qr_zalo.jpg" alt="Zalo QR Code" class="img-fluid qr-image shadow">
            </div>
        </div>

        <!-- Footer -->
        <div class="footer mt-5 text-muted">
            <p>✨ Created by Em Hieu ✨.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
