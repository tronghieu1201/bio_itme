<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Chuyen giao dien">🌙</button>

    <main class="bio-card album-page">
        <header class="album-header">
            <a href="./life.html" class="album-back" aria-label="Ve Goc ca nhan">
