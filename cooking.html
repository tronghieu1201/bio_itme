<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nau an - Trong Hieu</title>
    <meta name="description" content="Album nau an cua Trong Hieu - nhung mon minh tu nau va chia se hang ngay.">
    <link rel="canonical" href="https://tronghieu1201.github.io/bio_itme/cooking.html">
    <link rel="icon" type="image/png" href="images/favicon/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="bio-card album-page">
        <header class="album-header">
            <a href="#" class="album-back" id="album-back" aria-label="Về Góc cá nhân">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
        </header>

        <section class="photo-gallery" aria-label="Album anh nau an" data-gallery-dir="images/life/cooking/"
            data-github-owner="tronghieu1201" data-github-repo="bio_itme" data-github-branch="main">
        </section>
    </main>

    <div class="photo-lightbox" id="photo-lightbox" role="dialog" aria-label="Anh phong to" aria-hidden="true">
        <div class="photo-lightbox__backdrop"></div>
        <div class="photo-lightbox__content">
            <button class="photo-lightbox__close" id="photo-lightbox-close" aria-label="Dong">&times;</button>
            <img class="photo-lightbox__img" id="photo-lightbox-img" src="" alt="" loading="lazy" decoding="async">
            <div class="photo-lightbox__caption" id="photo-lightbox-caption"></div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>
        (function () {
            var backBtn = document.getElementById('album-back');
            if (!backBtn) return;

            backBtn.addEventListener('click', function (e) {
                e.preventDefault();

                var ref = document.referrer ? new URL(document.referrer, window.location.href) : null;
                if (ref && ref.pathname.endsWith('/life.html')) {
                    window.location.href = './life.html';
                } else {
                    window.location.href = './';
                }
            });
        })();
    </script>
</body>

</html>
