<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ban be - Trong Hieu</title>
    <meta name="description" content="Menu ban be cua Trong Hieu.">
    <link rel="canonical" href="https://tronghieu1201.github.io/bio_itme/friends.html">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="life.css">
</head>

<body>
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <main class="bio-card life-page">
        <header class="life-header">
            <a href="./life.html" class="life-back" aria-label="Ve Goc ca nhan">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
            <h1 class="life-title">B&#7841;n b&egrave;</h1>
        </header>

        <section class="life-grid" aria-label="Danh muc ban be">
            <button type="button" class="life-card life-card--button life-card--family" data-locked-href="./family.html" data-key="Hieu2004@mmm" data-key-placeholder="Chỉ có gia đình Hiếu mới biết key">
                <div class="life-card__icon"><i class="fas fa-heart" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Gia đình</h2><p class="life-card__desc">Gia đình của Hiếu</p></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>
            <button type="button" class="life-card life-card--button" data-locked-href="./memories.html">
                <div class="life-card__icon"><i class="fas fa-star" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">K&#7927; ni&#7879;m</h2><p class="life-card__desc">22 n&#259;m k&#7927; ni&#7879;m</p></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <button type="button" class="life-card life-card--button" data-locked-href="./students.html">
                <div class="life-card__icon"><i class="fas fa-user-graduate" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Nh&#7919;ng th&#7857;ng Sinh Vi&ecirc;n</h2><p class="life-card__desc">Hi&#7871;u v&agrave; b&#7841;n b&egrave;</p></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <button type="button" class="life-card life-card--button" data-locked-href="./love-22.html">
                <div class="life-card__icon"><i class="fas fa-heart" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Con gh&#7879; 22</h2><p class="life-card__desc">22 n&#259;m</p></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>
        </section>
    </main>

    <div class="key-modal" id="key-modal" role="dialog" aria-label="Nhap key" aria-hidden="true">
        <div class="key-modal__backdrop"></div>
        <article class="key-modal__card">
            <button type="button" class="key-modal__close" id="key-close" aria-label="Dong">&times;</button>
            <h2 class="key-modal__title">X&aacute;c nh&#7853;n</h2>
            <p class="key-modal__note">Nh&#7853;p key &#273;&#7875; m&#7903;</p>
            <form class="key-form" id="key-form">
                <input type="password" id="key-input" autocomplete="off" placeholder="Chỉ có bạn của Hiếu mới biết key">
                <button type="submit">M&#7903;</button>
                <p class="key-modal__error" id="key-error" aria-live="polite"></p>
            </form>
        </article>
    </div>

    <script src="theme.js"></script>
    <script>
        (function () {
            var modal = document.getElementById('key-modal');
            var form = document.getElementById('key-form');
            var input = document.getElementById('key-input');
            var error = document.getElementById('key-error');
            var closeBtn = document.getElementById('key-close');
            var targetHref = '';
            var targetKey = '';
            var defaultPlaceholder = input ? input.getAttribute('placeholder') : 'Chỉ có bạn của Hiếu mới biết key';
            var KEY = '171209';

            function openModal(card) {
                targetHref = card ? card.getAttribute('data-locked-href') || '' : '';
                targetKey = card ? card.getAttribute('data-key') || KEY : KEY;
                if (input) input.setAttribute('placeholder', card ? card.getAttribute('data-key-placeholder') || defaultPlaceholder : defaultPlaceholder);
                if (error) error.textContent = '';
                if (input) input.value = '';
                document.body.classList.add('is-modal-open');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                setTimeout(function () { if (input) input.focus(); }, 60);
            }

            function closeModal() {
                document.body.classList.remove('is-modal-open');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                targetHref = '';
                targetKey = '';
                if (input) input.setAttribute('placeholder', defaultPlaceholder);
            }

            document.querySelectorAll('[data-locked-href]').forEach(function (card) {
                card.addEventListener('click', function () {
                    openModal(card);
                });
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var keyValue = input.value.trim();
                if (!keyValue) {
                    error.innerHTML = 'H&atilde;y nh&#7853;p key';
                    input.focus();
                    return;
                }
                if (keyValue === targetKey && targetHref) {
                    window.location.href = targetHref;
                    return;
                }
                error.innerHTML = 'Nh&#7853;p key tr&#7853;t l&#7845;t';
                input.select();
            });

            closeBtn.addEventListener('click', closeModal);
            modal.querySelector('.key-modal__backdrop').addEventListener('click', closeModal);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>
</body>

</html>
