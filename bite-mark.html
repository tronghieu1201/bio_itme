<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bite Mark - Trong Hieu</title>
    <meta name="description" content="Bite Mark - Trong Hieu.">
    <link rel="canonical" href="https://tronghieu1201.github.io/bio_itme/bite-mark.html">
    <link rel="icon" type="image/webp" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dtpw5htqs/image/upload/v1782284174/4eae1994-3eea-4630-bc8e-10974bcad260_vvwupz.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="life.css">
</head>

<body>
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <main class="bio-card life-page">
        <header class="life-header">
            <a href="./connections.html" class="life-back" aria-label="Ve Connections">
                <i class="fas fa-arrow-left" aria-hidden="true"></i>
            </a>
            <h1 class="life-title">𝖊𝖒 𝖍í𝖚</h1>
        </header>

        <section class="life-grid" aria-label="Danh muc Bite Mark">
            <button type="button" class="life-card life-card--button" data-locked-href="./keepsakes.html" data-key-placeholder="" data-key-error="Chỉ có bạn Hiếu mới mở được">
                <div class="life-card__icon"><i class="fas fa-infinity" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Tạm lưu tạm giữ</h2><p class="life-card__desc">Mất bao lâu mới đủ</p></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>

            <button type="button" class="life-card life-card--button" data-locked-href="./best-friends.html" data-key="Tranh" data-key-placeholder="Mỏ thằng nào dẻo nhất" data-key-error="Chỉ có phòng 9 mở được">
                <div class="life-card__icon"><i class="fas fa-users" aria-hidden="true"></i></div>
                <div class="life-card__body"><h2 class="life-card__title">Những thằng cốt đột</h2><p class="life-card__desc">Những thằng ở tuổi 15</p></div>
                <i class="fas fa-chevron-right life-card__arrow" aria-hidden="true"></i>
            </button>
        </section>
    </main>

    <div class="key-modal" id="key-modal" role="dialog" aria-label="Nhap key" aria-hidden="true">
        <div class="key-modal__backdrop"></div>
        <article class="key-modal__card">
            <button type="button" class="key-modal__close" id="key-close" aria-label="Dong">&times;</button>
            <h2 class="key-modal__title">Xác nhận</h2>
            <form class="key-form" id="key-form">
                <input type="password" id="key-input" autocomplete="off" placeholder="">
                <button type="submit">Mở</button>
                <p class="key-modal__error" id="key-error" aria-live="polite"></p>
            </form>
        </article>
    </div>

    <script src="theme.js"></script>
    <script>
        (function () {
            var modal = document.getElementById('key-modal');
            var form = document.getElementById('key-form');
            var input = document.getElementById('key-input');
            var error = document.getElementById('key-error');
            var closeBtn = document.getElementById('key-close');
            var targetHref = '';
            var targetKey = '';
            var targetErrorMsg = '';
            var defaultPlaceholder = '';
            var KEY = '171209';
            var KEY_NOTICE_MESSAGE = 'V&igrave; b&#7843;n test n&ecirc;n c&#7847;n x&aacute;c minh...';
            var keyNoticeTimer = null;

            function getUnlockStorageKey(url) {
                var targetUrl = new URL(url, window.location.href);
                var filename = targetUrl.pathname.split('/').filter(Boolean).pop() || targetUrl.pathname;
                return 'life-unlocked:' + filename;
            }

            function rememberUnlockedPage(url) {
                try {
                    sessionStorage.setItem(getUnlockStorageKey(url), '1');
                } catch (e) {}
            }

            function ensureKeyNotice() {
                var notice = document.getElementById('key-notice');
                if (notice) return notice;

                notice = document.createElement('div');
                notice.id = 'key-notice';
                notice.className = 'key-notice';
                notice.setAttribute('role', 'status');
                notice.setAttribute('aria-live', 'polite');
                document.body.appendChild(notice);
                return notice;
            }

            function showKeyNotice() {
                var notice = ensureKeyNotice();
                clearTimeout(keyNoticeTimer);
                notice.innerHTML = KEY_NOTICE_MESSAGE;
                notice.classList.add('is-visible');
                keyNoticeTimer = setTimeout(function () {
                    notice.classList.remove('is-visible');
                }, 3200);
            }

            function openModal(card) {
                targetHref = card ? card.getAttribute('data-locked-href') || '' : '';
                targetKey = card ? card.getAttribute('data-key') || KEY : KEY;
                targetErrorMsg = 'X&aacute;c nh&#7853;n kh&ocirc;ng th&agrave;nh c&ocirc;ng';
                if (input) input.setAttribute('placeholder', card ? card.getAttribute('data-key-placeholder') || defaultPlaceholder : defaultPlaceholder);
                if (error) error.textContent = '';
                if (input) input.value = '';
                document.body.classList.add('is-modal-open');
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                setTimeout(function () { if (input) input.focus(); }, 60);
            }

            function closeModal() {
                document.body.classList.remove('is-modal-open');
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                targetHref = '';
                targetKey = '';
                targetErrorMsg = '';
                if (input) input.setAttribute('placeholder', defaultPlaceholder);
            }

            document.querySelectorAll('[data-locked-href]').forEach(function (card) {
                card.addEventListener('click', function () {
                    showKeyNotice();
                    openModal(card);
                });
            });

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var keyValue = input.value.trim();
                if (!keyValue) {
                    error.innerHTML = 'M&#7903; v&ocirc; hi&#7879;u';
                    input.focus();
                    return;
                }
                if (keyValue === targetKey && targetHref) {
                    rememberUnlockedPage(targetHref);
                    window.location.href = targetHref;
                    return;
                }
                error.innerHTML = targetErrorMsg;
                input.select();
            });

            closeBtn.addEventListener('click', closeModal);
            modal.querySelector('.key-modal__backdrop').addEventListener('click', closeModal);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>
</body>

</html>
